<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Corporación ABC S.A.C.</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ============ HEADER ============ -->
  <header class="topbar">
    <div class="brand">
      <div class="brand-logo">ABC</div>
      <div class="brand-text">
        <strong>Corporación ABC S.A.C.</strong>
        <span>Av. Perú 123 — Piura</span>
      </div>
    </div>
    <nav class="mainnav">
      <a href="#" data-window="inicio">Inicio</a>
      <a href="#" data-window="quienes-somos">Quiénes somos</a>
      <a href="#" data-window="actividades">Actividades</a>
      <a href="#" data-window="contactanos">Contáctanos</a>
    </nav>
  </header>

  <div class="layout">

    <!-- ============ SIDEBAR ============ -->
    <aside class="sidebar">
      <button class="side-link" data-window="mas-vendidos">Los más vendidos</button>
      <button class="side-link" data-window="ofertas-semana">Ofertas de la semana</button>
      <button class="side-link" data-window="liquidacion">Liquidación</button>
      <button class="side-link" data-window="entidades-publicas">Entidades públicas</button>
    </aside>

    <!-- ============ HUB (diagrama radial) ============ -->
    <main class="hub-area">
      <svg id="hub-svg" viewBox="0 0 700 560" role="img" aria-label="Mapa de categorías de la tienda ABC">
        <!-- las líneas se dibujan por JS para que se ajusten a los nodos -->
        <g id="hub-lines"></g>

        <!-- Nodo central -->
        <g class="hub-node hub-center" data-category="inicio">
          <circle cx="350" cy="280" r="66"></circle>
          <text x="350" y="274" text-anchor="middle" class="hub-node-title">ABC</text>
          <text x="350" y="296" text-anchor="middle" class="hub-node-sub">Logo</text>
        </g>

        <!-- Educación -->
        <g class="hub-node" data-category="educacion" transform="translate(350,80)">
          <circle r="58"></circle>
          <text text-anchor="middle" dy="6" class="hub-node-title">Educación</text>
        </g>

        <!-- Tecnología -->
        <g class="hub-node" data-category="tecnologia" transform="translate(110,340)">
          <circle r="58"></circle>
          <text text-anchor="middle" dy="6" class="hub-node-title">Tecnología</text>
        </g>

        <!-- Servicios -->
        <g class="hub-node" data-category="servicios" transform="translate(590,340)">
          <circle r="58"></circle>
          <text text-anchor="middle" dy="6" class="hub-node-title">Servicios</text>
        </g>

        <!-- Alimentos -->
        <g class="hub-node" data-category="alimentos" transform="translate(350,480)">
          <circle r="58"></circle>
          <text text-anchor="middle" dy="6" class="hub-node-title">Alimentos</text>
        </g>
      </svg>
      <p class="hub-hint">Haz clic en una categoría para abrir su ventana.</p>
    </main>
  </div>

  <!-- ============ CAPA DE VENTANAS (se generan dinámicamente) ============ -->
  <div id="window-layer"></div>

  <!-- ============ CAPA DE MODALES (bienvenida / mensajes) ============ -->
  <div id="modal-layer"></div>

  <script src="js/app.js"></script>
</body>
</html>
